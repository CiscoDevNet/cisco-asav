---

{{- if .Values.worker_nodes.persistence.lina.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.asac.app_name }}-cleanup-primary
  labels:
    app: {{ .Values.asac.app_name }}{{- if eq .Values.asac.enable_ha "true" }}-primary{{- end }}
    role: primary-cleanup
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        job: {{ .Values.asac.app_name }}-cleanup-primary
    spec:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ASAC_PRIMARY
              topologyKey: kubernetes.io/hostname
      restartPolicy: Never
      volumes:
      - name: lina-path
        hostPath:
          path: {{ .Values.worker_nodes.persistence.lina.hostPath }}
          type: DirectoryOrCreate
      containers:
      - name: cleanup
        image: busybox:latest
        command: ["/bin/sh","-c"]
        args:
          - "rm -rf {{ .Values.worker_nodes.persistence.lina.hostPath }}  || true"
        volumeMounts:
        - name: lina-path
          mountPath: {{ .Values.worker_nodes.persistence.lina.hostPath }}
{{- end }}

---

{{- if and .Values.worker_nodes.persistence.lina.enabled (eq .Values.asac.enable_ha "true") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.asac.app_name }}-cleanup-secondary
  labels:
    app: {{ .Values.asac.app_name }}{{- if eq .Values.asac.enable_ha "true" }}-secondary{{- end }}
    role: secondary-cleanup
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        job: {{ .Values.asac.app_name }}-cleanup-secondary
    spec:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ASAC_SECONDARY
              topologyKey: kubernetes.io/hostname
      restartPolicy: Never
      volumes:
      - name: lina-path
        hostPath:
          path: {{ .Values.worker_nodes.persistence.lina.hostPath }}
          type: DirectoryOrCreate
      containers:
      - name: cleanup
        image: busybox:latest
        command: ["/bin/sh","-c"]
        args:
          - "rm -rf {{ .Values.worker_nodes.persistence.lina.hostPath }} || true"
        volumeMounts:
        - name: lina-path
          mountPath: {{ .Values.worker_nodes.persistence.lina.hostPath }}
{{- end }}

